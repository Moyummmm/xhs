services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: xhs
    ports:
      - "12345:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data

  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:
